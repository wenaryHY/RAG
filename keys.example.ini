; RAG 系统密钥 — 模板文件
; 复制为 keys.ini (或 config.toml 中 paths.keys_file 指向的路径) 并填真实密钥
; 此文件可安全提交到 git

[deepseek]
key      = sk-your-deepseek-key
base_url = https://api.deepseek.com

[openrouter]
key      = sk-or-v1-your-openrouter-key
base_url = https://openrouter.ai/api/v1

[xstx]
key      = sk-your-xstx-key
base_url = https://api.xstx.info/v1

[siliconflow]
key      = sk-your-siliconflow-key
base_url = https://api.siliconflow.cn/v1

[ragflow]
key      = ragflow-your-ragflow-key
base_url = http://127.0.0.1:9380
